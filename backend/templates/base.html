<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/dashboard.css" rel="stylesheet"> <!-- Archivo CSS específico -->
</head>
<body>
    <div class="d-flex" style="min-height: 100vh;">
        <!-- Sidebar -->
        <div class="sidebar bg-dark text-white p-3" style="width: 250px; position: fixed; height: 100vh;">
            <div class="menu-header">
                <h4 class="menu-title mb-4">Menú</h4>
            </div>
            <a href="/" class="d-block text-white py-2">🏠 Home</a>
            <a href="/productos" class="d-block text-white py-2">📦 Productos</a>
            <a href="/movimientos" class="d-block text-white py-2">🔄 Entradas/Salidas</a>
        </div>

        <!-- Content -->
        <div class="content flex-grow-1 p-4" style="margin-left: 250px;">
            {% include 'navbar.html' %}
            
            <div>
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
