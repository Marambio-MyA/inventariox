{% extends "app/base.html" %}

{% block title %}Detalles del Producto{% endblock %}

{% block content %}
<h2 class="mt-4">👁 Detalles del Producto</h2>

<table class="table">
    <tr>
        <th>Nombre:</th>
        <td>{{ producto.nombre }}</td>
    </tr>
    <tr>
        <th>Precio:</th>
        <td>${{ producto.precio }}</td>
    </tr>
    <tr>
        <th>Categoría:</th>
        <td>{{ producto.categoria }}</td>
    </tr>
    <tr>
        <th>Stock Disponible:</th>
        <td>{{ producto.stock }}</td>
    </tr>
</table>

<a href="{% url 'actualizar_producto' producto.id %}" class="btn btn-warning">✏ Editar</a>
<a href="{% url 'listar_productos' %}" class="btn btn-secondary">Volver</a>
{% endblock %}
