{% extends "app/base.html" %}

{% block title %}Actualizar Producto{% endblock %}

{% block content %}
<h2 class="mt-4">✏ Editar Producto</h2>

<form method="POST">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Precio</label>
        <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto.precio }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Categoría</label>
        <input type="text" name="categoria" class="form-control" value="{{ producto.categoria }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Stock</label>
        <input type="number" name="stock" class="form-control" value="{{ producto.stock }}" required>
    </div>
    <button type="submit" class="btn btn-warning">Actualizar</button>
    <a href="{% url 'listar_productos' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
