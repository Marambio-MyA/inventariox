<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - @yield_title</title>
    {% load static %}
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Barra Lateral -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <div class="position-sticky">
                    <h4 class="px-3">Menú</h4>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/home/' %}active{% endif %}" href="{% url 'home' %}">
                                Home
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/actualizar/' %}active{% endif %}" href="{% url 'actualizar' %}">
                                Actualizar Info Productos
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/entradas_salidas/' %}active{% endif %}" href="{% url 'entradas_salidas' %}">
                                Entradas/Salidas de Inventario
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Contenedor de las Vistas Principales -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-4">
                {% block content %}
                <!-- El contenido de cada vista se carga aquí -->
                {% endblock %}
            </main>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
