<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Aplicación</title>
    
    <!-- Link de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    
    {% block extra_head %}
    {% endblock %}
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="bg-dark text-white" id="sidebar" style="width: 250px; height: 100vh;">
            <div class="sidebar-header text-center py-3">
                <h4>Mi Aplicación</h4>
            </div>
            <div class="list-group list-group-flush">
                <a href="{% url 'home' %}" class="list-group-item list-group-item-action bg-dark text-white">
                    <i class="fa fa-home"></i> Home
                </a>
                <a href="{% url 'listar_productos' %}" class="list-group-item list-group-item-action bg-dark text-white">
                    <i class="fa fa-box"></i> Productos
                </a>
                <a href="{% url 'entradas_salidas' %}" class="list-group-item list-group-item-action bg-dark text-white">
                    <i class="fa fa-truck"></i> Entradas/Salidas
                </a>
                <a href="{% url 'login' %}" class="list-group-item list-group-item-action bg-dark text-white">
                    <i class="fa fa-sign-in-alt"></i> Login
                </a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper" style="width: 100%; padding: 20px;">
            {% include 'app/includes/navbar.html' %} <!-- Navbar -->

            {% block content %}
            {% endblock %}
        </div>
    </div>

    <!-- Scripts de Bootstrap y jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}
    {% endblock %}
</body>
</html>
